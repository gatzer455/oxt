<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Courier New", "Fira Code", monospace;
      background: linear-gradient(135deg, #1a0000 0%, #4a0a0a 50%, #1a0000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.6s ease-out;
    }
    .ox-art {
      font-size: 14px;
      line-height: 1.3;
      color: #8b0000;
      white-space: pre;
      margin-bottom: 20px;
    }
    h1 {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 28px; font-weight: 700;
      color: #8b0000; margin-bottom: 12px;
    }
    p {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px; color: #555;
    }
    code {
      background: #f4f4f4; padding: 2px 8px;
      border-radius: 4px; font-family: "Courier New", monospace;
      font-size: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <pre class="ox-art">
       .  .
      (  x  x  )
       (  ___  )
        |  _  |
        | | | |
       /| | | |\
      / | | | | \
    </pre>
    <h1>Error de autorización</h1>
    <p>No se recibió el código de autorización.</p>
    <p>Vuelve a intentarlo con <code>oxt google auth</code>.</p>
  </div>
</body>
</html>
